name: unixsock
description: Non-blocking Unix domain Socket/ServerSocket subtypes built with Dart FFI on libc.
version: 0.1.0

environment:
  sdk: ^3.5.0

dependencies:
  ffi: ^2.1.3

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.6

platforms:
  android:
  ios:
  linux:
  macos:

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
