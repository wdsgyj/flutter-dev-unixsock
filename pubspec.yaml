name: unixsock
description: Rust tokio + rustls backed Socket wrappers for Dart/Flutter via FFI.
version: 0.1.0

environment:
  sdk: ^3.5.0

dependencies:
  ffi: ^2.1.3

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.6

platforms:
  android:
  ios:
  linux:
  macos:

flutter:
  plugin:
    platforms:
      ios:
        ffiPlugin: true
      macos:
        ffiPlugin: true
